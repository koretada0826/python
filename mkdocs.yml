site_name: Python 月100万独立コース
site_description: クロード駆動でPythonエンジニアとして独立し月100万円を目指す23日コース
site_url: https://python-23x2.onrender.com
repo_url: https://github.com/koretada0826/python
repo_name: koretada0826/python
edit_uri: edit/main/docs/
copyright: 個人学習用

theme:
  name: material
  language: ja
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: ダークモードへ
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: ライトモードへ
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
  font:
    text: Noto Sans JP
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/koretada0826/python
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: "#"

plugins:
  - search:
      lang: ja

nav:
  - 🏠 トップ: index.md
  - 📋 全体マップ: 00_スタート.md
  - 🎯 基礎(Day 1-13):
      - "📌 概要": 13_統合_中間チェック.md
      - "Day 1 環境構築": 01_環境構築.md
      - "Day 2 Python基礎": 02_基礎.md
      - "Day 3 実用": 03_実用.md
      - "Day 4 pandas": 04_pandas.md
      - "Day 5 スクレイピング": 05_スクレイピング.md
      - "Day 6 AI基礎": 06_AI基礎.md
      - "Day 7 AI高度(RAG)": 07_AI高度.md
      - "Day 8 SaaS化": 08_SaaS化.md
      - "Day 9 ポートフォリオ": 09_ポートフォリオ.md
      - "Day 10 GitHub・SNS": 10_GitHub_SNS.md
      - "Day 11 ランサーズ": 11_ランサーズ.md
      - "Day 12 単価UP・月額化": 12_単価UP月額化.md
  - 🚀 中級〜上級(Day 14-22):
      - "Day 14 SQL・DB": 14_SQL_DB.md
      - "Day 15 Git高度": 15_Git高度.md
      - "Day 16 Docker": 16_Docker.md
      - "Day 17 AWS・クラウド": 17_AWS_クラウド.md
      - "Day 18 テスト・品質": 18_テスト_品質.md
      - "Day 19 API設計": 19_API設計.md
      - "Day 20 セキュリティ": 20_セキュリティ.md
      - "Day 21 チーム開発": 21_チーム開発.md
      - "Day 22 契約・税務・マーケ": 22_契約_税務_マーケ.md
  - 🎉 最終:
      - "Day 23 独立宣言": 23_最終_独立宣言.md
  - 🛠 テンプレ:
      - "クロード依頼テンプレ": resources/クロード依頼テンプレ集.md
      - "コード雛形集": resources/コード雛形集.md
      - "ランサーズ提案文集": resources/ランサーズ提案文集.md
  - 📊 進捗ノート: progress.md
