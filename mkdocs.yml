site_name: 月100万 Python エンジニア独立コース
site_description: クロード駆動でPythonエンジニアとして独立し月100万円を目指す23日コース
site_url: https://python-koretada.onrender.com
repo_url: https://github.com/koretada0826/python
repo_name: koretada0826/python
copyright: 個人学習用

theme:
  name: material
  language: ja
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: ダークモードへ
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: ライトモードへ
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - footnotes

plugins:
  - search:
      lang: ja

nav:
  - 🏠 トップ: index.md
  - 📋 全体マップ: 00_スタート.md
  - 📊 進捗ノート: progress.md
  - "🎯 Day 1-13 基礎":
      - "Day 1 環境構築": 01_環境構築.md
      - "Day 2 Python基礎": 02_基礎.md
      - "Day 3 実用": 03_実用.md
      - "Day 4 pandas": 04_pandas.md
      - "Day 5 スクレイピング": 05_スクレイピング.md
      - "Day 6 AI基礎": 06_AI基礎.md
      - "Day 7 AI高度": 07_AI高度.md
      - "Day 8 SaaS化": 08_SaaS化.md
      - "Day 9 ポートフォリオ": 09_ポートフォリオ.md
      - "Day 10 GitHub・SNS": 10_GitHub_SNS.md
      - "Day 11 ランサーズ": 11_ランサーズ.md
      - "Day 12 単価UP・月額化": 12_単価UP月額化.md
      - "Day 13 統合・中間チェック": 13_統合_中間チェック.md
  - "🚀 Day 14-22 中級〜上級":
      - "Day 14 SQL・DB": 14_SQL_DB.md
      - "Day 15 Git高度": 15_Git高度.md
      - "Day 16 Docker": 16_Docker.md
      - "Day 17 AWS・クラウド": 17_AWS_クラウド.md
      - "Day 18 テスト・品質": 18_テスト_品質.md
      - "Day 19 API設計": 19_API設計.md
      - "Day 20 セキュリティ": 20_セキュリティ.md
      - "Day 21 チーム開発": 21_チーム開発.md
      - "Day 22 契約・税務・マーケ": 22_契約_税務_マーケ.md
  - "🎉 Day 23 最終":
      - "Day 23 独立宣言": 23_最終_独立宣言.md
  - "🛠 テンプレ集":
      - "クロード依頼テンプレ": resources/クロード依頼テンプレ集.md
      - "コード雛形集": resources/コード雛形集.md
      - "ランサーズ提案文集": resources/ランサーズ提案文集.md
